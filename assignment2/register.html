<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />	
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    
	<link rel="stylesheet" href="css/style.css">
	<script src="js/script.js"></script>

	<title>Register - Melbourne Explorer</title>
</head>

<body>
    <header>
        <h1>Melbourne Explorer</h1>

        <nav>
            <ul>
                <li><a href="index.html" id="nav-home">Home</a></li>
                <li><a href="restuarants.html" id="nav-restaurants">Restaurants</a></li>
                <li><a href="recommend.html" id="nav-recommend">Recommendations</a></li>
                <li><a href="register.html" id="nav-register">Register</a></li>
                <li><a href="reservation.html" id="nav-reservation">Reservation</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <form id="regform" method="post"
		action="http://mercury.swin.edu.au/it000000/formtest.php">

		<fieldset>
			<legend>Account Information</legend>

			<div class="textinput">
				<label for="sid">Username: </label>
				<input id="sid" type="text" name="sid" />
			</div>

			<div class="textinput">
    			<label for="email">Email Address: </label>
    			<input id="email" type="email" name="email" />
			</div>

			<div class="textinput">
    			<label for="phone">Phone Number: </label>
    			<input id="phone" type="text" name="phone" />
			</div>

			<div class="textinput">
				<label for="pwd1">Password</label>
				<input id="pwd1" type="password" name="pwd1" />
			</div>

			<div class="textinput">
				<label for="pwd2">Retype Password</label>
				<input id="pwd2" type="password" name="pwd2" />
			</div>

			<div class="radioinput"> 
            	<span class="radiolabel">Gender</span>

				<input id="genm" type="radio" name="gender" value="M" />
				<label for="genm">Male</label>

				<input id="genf" type="radio" name="gender" value="F" />
				<label for="genf">Female</label>
        	</div>
            
            <div class="textinput">
    		<label for="dietpref">Dietary Preference</label>
    		<select id="dietpref" name="dietpref">
        		<option value="">-- Select --</option>
        		<option value="vegan">Vegan</option>
        		<option value="halal">Halal</option>
        		<option value="none">None</option>
    		</select>
			</div>

			<div class="textinput">
    		<label for="country">Country / Region</label>
    		<select id="country" name="country">
        		<option value="">-- Select --</option>
        		<option value="australia">Australia</option>
        		<option value="newzealand">New Zealand</option>
        		<option value="asia">A country in Asia</option>
        		<option value="europe">A country in Europe</option>
        		<option value="other">Other</option>
    		</select>
			</div>
		</fieldset>

		<div class="buttoninput">
			<input type="submit" value="Register Here" />
		</div>
	</form>

    </main>

    <footer>
        <p>&copy; 2026 Melbourne Explorer</p>
    </footer>
</body>
</html>
