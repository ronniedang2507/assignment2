<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />	
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    
	<link rel="stylesheet" href="css/style.css">
	<script src="js/script.js"></script>

	<title>Recommend - Melbourne Explorer</title>
</head>

<body>
    <header>
        <h1>Melbourne Explorer</h1>

        <nav>
            <ul>
                <li><a href="index.html" id="nav-home">Home</a></li>
                <li><a href="restuarants.html" id="nav-restaurants">Restaurants</a></li>
                <li><a href="recommend.html" id="nav-recommend">Recommendations</a></li>
                <li><a href="register.html" id="nav-register">Register</a></li>
                <li><a href="reservation.html" id="nav-reservation">Reservation</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <form id="reccform">
            <label for="cuisine">Choose a Cuisine:</label><br>
            <select id="cuisine">
            <option value="">-- Select --</option>
            <option value="thai">Thai</option>
            <option value="asian">Asian</option>
            <option value="burgers">Burgers</option>
            <option value="italian">Italian</option>
        </select>
        <br><br>

        <label for="area">Location Preference:</label><br>
        <select id="area">
            <option value="">-- Select --</option>
            <option value="melbournecbd">Melbourne CBD</option>
            <option value="richmond">Richmond</option>
            <option value="none">No preference</option>
        </select><br><br>
        
        <label for="price">Price Range:</label><br>
        <select id="price">
            <option value="">-- Select --</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select><br><br>

        <input type="button" value="Get Recommendation" onclick="recommend()">
        </form>

        <h3> Your Recommendations:</h3>
        <p id="result"></p>

    </main>

    <footer>
        <p>&copy; 2026 Melbourne Explorer</p>
    </footer>
</body>
</html>
